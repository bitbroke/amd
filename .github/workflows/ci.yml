name: Python CI

on:
  push:
    branches: [ main, dev-api ]
  pull_request:
    branches: [ main, dev-api ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Match your local development environment (Python 3.13)
        python-version: ["3.13"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov flake8  # Ensure testing tools are present

    - name: Run flake8 (Lint Check)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with Coverage
      run: |
        # This runs your tests and shows the coverage for the engine folder
        python -m pytest --cov=engine